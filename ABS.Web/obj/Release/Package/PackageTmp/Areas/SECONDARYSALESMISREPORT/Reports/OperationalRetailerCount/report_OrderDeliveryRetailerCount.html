            <div class="col-md-12 form-group" >    
              
                    


                <div ng-show="( ReportMode==1) || (ReportMode==2) " class="col-md-12 form-group" style="padding:15px;">

                    <div class="col-md-3" style="width: 300px;">
                        <label for="txtDeliveryFromDate" class="col-sm-2 label-adjust" style="width: 100px; font-weight:bold;">From</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="txtDeliveryFromDate" name="txtDeliveryFromDate"
                                   ng-model="model.DeliveryFromDate" style="width: 100px;"
                                   datepicker-popup="{{format}}" is-open="openedFrom" min-date="'2000-01-01'" max-date="'2020-12-31'"
                                   datepicker-options="dateOptions" show-button-bar="false"
                                   validate-on="blur"
                                   clear-on="focus"
                                   date invalid-date-message="'Invalid date'"
                                   min-date-message="'Date below minimum value'"
                                   message-after="calendarButton"
                                   message-display-class="remove-left-dent"
                                   ng-focus="setDrag(true);setVisited('txtDeliveryFromDate')" ng-blur="setDrag(false)">
                            <span id="calendarButton" style="float:right;">
                                <button type="button" class="btn btn-default height-to-form-comtrol" ng-click="openFrom($event)">
                                    <i class="glyphicon glyphicon-calendar"></i>
                                </button>
                            </span>
                        </div>
                    </div>

                    <div class="col-md-3" style="width: 300px;">
                        <label for="txtDeliveryToDate" class="col-sm-2 label-adjust" style="width: 100px; font-weight:bold;">To</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="txtDeliveryToDate" name="txtDeliveryToDate"
                                   ng-model="model.DeliveryToDate" style="width: 100px;"
                                   datepicker-popup="{{format}}" is-open="openedTo" min-date="'2000-01-01'" max-date="'2020-12-31'"
                                   datepicker-options="dateOptions" show-button-bar="false"
                                   validate-on="blur"
                                   clear-on="focus"
                                   date invalid-date-message="'Invalid date'"
                                   min-date-message="'Date below minimum value'"
                                   message-after="calendarButton"
                                   message-display-class="remove-left-dent"
                                   ng-focus="setDrag(true);setVisited('txtDeliveryToDate')" ng-blur="setDrag(false)">
                            <span id="calendarButton" style="float:right;">
                                <button type="button" class="btn btn-default height-to-form-comtrol" ng-click="openTo($event)">
                                    <i class="glyphicon glyphicon-calendar"></i>
                                </button>
                            </span>
                        </div>
                    </div>
                    <div class="col-md-2" ng-show="ReportMode==1">
                        <button type="submit" style="font-weight:bold;" class="btn btn-primary" id="btnShowReport" ng-click="ShowReport(model.DeliveryFromDate,model.DeliveryToDate)">&#160;&#160;Show Report (Detail)&#160;&#160;</button>
                    </div>
                    <div class="col-md-2" ng-show="ReportMode==2">
                        <button type="submit" style="font-weight:bold;" class="btn btn-primary" id="btnShowReport" ng-click="ShowReport(model.DeliveryFromDate,model.DeliveryToDate)">&#160;&#160;Show Report (Summary)&#160;&#160;</button>
                    </div>

    </div>-->
                </div>
